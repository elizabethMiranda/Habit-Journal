spring.application.name=habit-journal-api
#Hacemos visible la consola de H2
spring.h2.console.enabled=true
#Url de la base de datos en memoria que Spring creo
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
#le decimos a Hibernate que hable el dialecto de H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#Muestra las consultas SQL en la consola
spring.jpa.show-sql=true
#Las formatea para que sean legibles
spring.jpa.properties.hibernate.format_sql=true